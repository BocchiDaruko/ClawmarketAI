name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Smart Contracts ─────────────────────────────────────────────────────────
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npm test
        env:
          REPORT_GAS: "true"

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    name: Backend API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     clawmarket
          POSTGRES_PASSWORD: clawmarket
          POSTGRES_DB:       clawmarketai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run database migrations
        run: cd backend && node src/db/migrate.js
        env:
          DATABASE_URL:  postgresql://clawmarket:clawmarket@localhost:5432/clawmarketai_test
          REDIS_URL:     redis://localhost:6379
          NODE_ENV:      test
          PORT:          3001
          JWT_SECRET:    test-secret
          API_KEY_SALT:  test-salt
          CHAIN_ID:      8453
          BASE_RPC_URL:  https://mainnet.base.org

      - name: Run backend tests
        run: cd backend && npm test
        env:
          DATABASE_URL:  postgresql://clawmarket:clawmarket@localhost:5432/clawmarketai_test
          REDIS_URL:     redis://localhost:6379
          NODE_ENV:      test
          PORT:          3001
          JWT_SECRET:    test-secret
          API_KEY_SALT:  test-salt
          CHAIN_ID:      8453
          BASE_RPC_URL:  https://mainnet.base.org

  # ─── Python Agents ───────────────────────────────────────────────────────────
  agents:
    name: Python Agents
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [buyer-agent, seller-agent, creator-agent, arbitrage-agent]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install agent dependencies
        run: |
          pip install web3 aiohttp pydantic eth-account websockets anthropic \
                      pytest pytest-asyncio --quiet

      - name: Run ${{ matrix.agent }} tests
        run: pytest agents/${{ matrix.agent }}/tests/ -v

  # ─── Python SDK ───────────────────────────────────────────────────────────────
  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install SDK + dependencies
        run: pip install -e "sdk/python[dev]" --quiet

      - name: Run Python SDK tests
        run: cd sdk/python && pytest tests/ -v

  # ─── JavaScript SDK ───────────────────────────────────────────────────────────
  sdk-javascript:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/javascript/package-lock.json

      - name: Install SDK dependencies
        run: cd sdk/javascript && npm ci

      - name: Build SDK
        run: cd sdk/javascript && npm run build || true

      - name: Run JavaScript SDK tests
        run: cd sdk/javascript && npm test

  # ─── Dashboard build check ────────────────────────────────────────────────────
  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build dashboard
        run: cd dashboard && npm run build

  # ─── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit contract dependencies
        run: npm audit --audit-level=high || true

      - name: Audit backend dependencies
        run: cd backend && npm audit --audit-level=high || true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ─── All checks passed ────────────────────────────────────────────────────────
  all-checks:
    name: All Checks Passed
    needs: [contracts, backend, agents, sdk-python, sdk-javascript, dashboard]
    runs-on: ubuntu-latest
    steps:
      - name: All jobs passed
        run: echo "✓ All CI checks passed"
